{% extends 'base.html' %}

{% block content %}

<div class="form-box">
    <h2>Verify OTP</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="otp" placeholder="Enter OTP" required>
        <button class="btn">Verify</button>
    </form>
</div>

{% endblock %}
