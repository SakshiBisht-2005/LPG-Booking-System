{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>LPG Booking</title>
    <style>
    body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f9;
}

header {
    background: #0d47a1;
    color: white;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

.container {
    padding: 20px;
}

/* HERO IMAGE */
.hero img {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

/* FORM */
.form-box {
    background: white;
    padding: 20px;
    width: 320px;
    margin: 30px auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    border-radius: 8px;
    text-align: center;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

/* BUTTON */
.btn {
    background: #0d47a1;
    color: white;
    padding: 10px;
    border: none;
    width: 100%;
    cursor: pointer;
    border-radius: 5px;
}

.btn:hover {
    background: #1565c0;
}

/* DASHBOARD CARDS */
.card-container {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

.card {
    flex: 1;
    background: white;
    padding: 30px;
    text-align: center;
    text-decoration: none;
    color: black;
    box-shadow: 0 0 10px gray;
    border-radius: 8px;
}
.card {
    background: white;
    padding: 20px;
    margin: 15px 0;
    box-shadow: 0 0 8px rgba(0,0,0,0.2);
    border-radius: 8px;
}

.card h3 {
    margin-bottom: 10px;
}

/* Status Colors */
.pending {
    color: orange;
    font-weight: bold;
}
.dispatched {
    color: blue;
    font-weight: bold;
}
.delivered {
    color: green;
    font-weight: bold;
}
/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 10px;
    border: 1px solid #ccc;
    text-align: center;
}

/* STATUS COLORS */
.pending {
    color: orange;
}
.dispatched {
    color: blue;
}
.delivered {
    color: green;
}

/* ERROR */
.error {
    color: red;
}
</style>
</head>

<body>

<header>
    <h1>🔥 LPG Gas Agency</h1>
    <nav>
        <a href="/">Home</a>
        <a href="/dashboard/">Dashboard</a>
        <a href="/logout/">Logout</a>
    </nav>
</header>

<div class="container">
    {% block content %}{% endblock %}
</div>

<footer>
    <p>© 2026 LPG Booking System</p>
</footer>

</body>
</html>
